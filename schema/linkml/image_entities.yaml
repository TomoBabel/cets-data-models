name: CETMDImageEntities
id: https://w3id.org/cetmd/imageentities
version: 0.0.1
description: Schema for cryoET alignments

prefixes:
  linkml: https://w3id.org/linkml/
  image_entities: https://w3id.org/cetmd/imageentities/

default_prefix: image_entities

imports:
- linkml:types
- ./image
- ./coordinate_systems
- ./coordinate_transforms
- ./alignment
- ./common

slots:
  section:
    description: 0-based section index to the entity inside a stack.
  nominal_tilt_angle:
    description: The tilt angle reported by the microscope
    range: float
  accumulated_dose:
    description: The pre-exposure up to this image in e-/A^2
    range: float
  defocus_u:
    description: Estimated defocus U for this image in Angstrom, underfocus positive.
    range: float
  defocus_v:
    description: Estimated defocus V for this image in Angstrom, underfocus positive.
    range: float
  defocus_angle:
    description: Estimated angle of astigmatism.
    range: float
  particle_index:
    description: Index of a particle inside a tomogram.
    range: integer
  ctf_metadata:
    description: A set of CTF patameters for an image.
    range: CTFMetadata
  ctf_corrected: 
    description: Flag to indicate if this was reconstructed from a tilt-series with the ctf corrected.
    range: boolean
  defocus_handedness:
    description: The handedness of the tilt geometry used to describe whether the focus increases or decreases as a function of Z distance.
    range: integer
  even_path:
    description: Path of the even file.
    range: string
  odd_path:
    description: Path of the odd file.
    range: string


classes:
  CTFMetadata:
    description: A set of CTF patameters for an image.
    slots:
      - defocus_u
      - defocus_v
      - defocus_angle
      - defocus_handedness
    slot_usage:
      defocus_handedness:
        ifabsent: -1
  AcquisitionMetadataMixin:
    description: Metadata concerning the acquisition process.
    slots:
      - nominal_tilt_angle
      - accumulated_dose
      - ctf_metadata
  GainFile:
    is_a: Image2D
    description: A gain reference file.
    slots:
      - path
  DefectFile:
    is_a: Image2D
    description: A detector defect file.
    slots:
      - path
  MovieFrame:
    is_a: Image2D
    mixins:
      - AcquisitionMetadataMixin
    description: An individual movie frame
    slots:
      - path
      - section
  MovieStack:
    description: A stack of movie frames.
    slots:
      - id
      - path
    attributes:
      images:
        description: The movie frames in the stack
        range: MovieFrame
        multivalued: true
  MovieStackSeries:
    description: A group of movie stacks that belong to a single tilt series.
    slots:
      - id
    attributes:
      stacks:
        description: The movie stacks.
        range: MovieStack
        multivalued: true
        inlined_as_list: true
  BaseProjectionImage:
    is_a: Image2D
    mixins:
      - AcquisitionMetadataMixin
    description: Base class for different projection image types, not for direct use.
    abstract: true 
    slots:
      - path
      - section
  ProjectionImage:
    is_a: BaseProjectionImage
    description: A projection image.
  SubProjectionImage:
    is_a: ProjectionImage
    description: A croppecd projection image.
    slots:
      - particle_index
  TiltImage:
    is_a: BaseProjectionImage
    description: A projection image that belongs to a tilt series.
    attributes:
      movie_stack_id:
        description: The ID of the movie stack for this tilt image.
        range: string
  TiltSeries:
    description: A stack of projection images.
    slots:
      - id
      - path
      - ctf_corrected
      - even_path
      - odd_path
    attributes:
      images:
        description: The projections in the stack.
        range: TiltImage
        multivalued: true
        inlined_as_list: true
      movie_stack_series_id: 
        description: The ID of the movie stack series for this tilt series.
        range: string
  Tomogram:
    is_a: Image3D
    description: A 3D tomogram.
    slots:
      - id
      - path
      - ctf_corrected
      - even_path
      - odd_path
    attributes:
      tilt_series_id:
        description: The ID of the tilt series for this tomogram.
        range: string
  ParticleMap:
    is_a: Image3D
    description: A 3D particle density map.
    slots:
      - path





