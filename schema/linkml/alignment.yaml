name: CETMDAlignment
id: https://w3id.org/cetmd/alignment
version: 0.0.1
description: Schema for cryoET alignments

prefixes:
  linkml: https://w3id.org/linkml/
  alignment: https://w3id.org/cetmd/alignment/
  coord_transforms: https://w3id.org/cetmd/coord_transforms/

default_prefix: alignment

imports:
- linkml:types
- ./coordinate_transforms
- ./common

classes:
  ProjectionAlignment:
    is_a: CoordinateTransformation
    description: The tomographic alignment for a single projection.
    slots:
      - id
    slot_usage:
      transformation_type:
        ifabsent: TransformationType(projection_alignment)
    attributes:
      tilt_image_id:
        description: >-
          ID of the tilt-image this alignment applies to. Multiple alignments (e.g. produced 
          by different algorithms) may reference the same tilt-image.
        range: string
      sequence:
        description: The sequence of transformations
        range: CoordinateTransformation
        maximum_cardinality: 2
        any_of:
          - range: Affine
          - range: Translation
        multivalued: true

  Alignment:
    description: The tomographic alignment for a tilt series.
    attributes:
        tilt_series_id:
          description: >-
            ID of the tilt-series this alignment set applies to. Multiple Alignments (e.g. 
            from different algorithms) may reference the same tilt-series.
          range: string
        projection_alignments:
          description: alignment for a specific projection
          range: ProjectionAlignment
          multivalued: true
          inlined_as_list: true



