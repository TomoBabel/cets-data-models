name: CETMDCoordTransforms
id: https://w3id.org/cetmd/coord_transforms
version: 0.0.1
description: Schema for cryoET alignments
prefixes:
  linkml: https://w3id.org/linkml/
  coord_transforms: https://w3id.org/cetmd/coord_transforms/

default_prefix: coord_transforms

imports:
- linkml:types
- ./coordinate_systems

slots:
  type:
    description: The type of transformation.
    range: TransformationType

classes:
  CoordinateTransformation:
    description: A coordinate transformation
    slots:
      - type
    attributes:
      name:
        description: The name of the coordinate transformation
        range: string
      input:
        description: The source coordinate system name
        range: string
      output:
        description: The target coordinate system name
        range: string

  Identity:
    description: The identity transformation
    is_a: CoordinateTransformation
    slot_usage:
      type:
        ifabsent: string(identity)

  AxisNameMapping:
    description: Axis name to Axis name mapping
    attributes:
      axis1_name:
        description: The type of transformation
        range: string
      axis2_name:
        description: The mapping of the axis names
        range: string

  MapAxis:
    description: Axis permutation transformation
    is_a: CoordinateTransformation
    slot_usage:
      type:
        ifabsent: string(map_axis)
    attributes:
      map_axis:
        description: The permutation of the axes
        range: AxisNameMapping
        inlined: true
        multivalued: true

  Translation:
    description: A translation transformation
    is_a: CoordinateTransformation
    slot_usage:
      type:
        ifabsent: string(translation)
    attributes:
      translation:
        description: The translation vector
        range: float
        multivalued: true

  Scale:
    description: A scaling transformation
    is_a: CoordinateTransformation
    slot_usage:
      type:
        ifabsent: string(scale)
    attributes:
      scale:
        description: The scaling vector
        range: float
        multivalued: true

  Affine:
    description: An affine transformation
    is_a: CoordinateTransformation
    slot_usage:
      type:
        ifabsent: string(affine)
    attributes:
      affine:
        description: The affine matrix
        range: float
        array:
          exact_number_dimensions: 2
          dimensions:
            - alias: exact_card
              exact_cardinality: 3
            - alias: exact_card
              exact_cardinality: 3

  Rotation2D:
    description: An 2D rotation transformation
    is_a: CoordinateTransformation
    slot_usage:
      type:
        ifabsent: string(affine)
    attributes:
      affine:
        description: The rotation matrix
        range: float
        array:
          exact_number_dimensions: 2
          dimensions:
            - alias: exact_card
              exact_cardinality: 2
            - alias: exact_card
              exact_cardinality: 2

  Flip2D:
    description: An 2D flip transformation
    is_a: CoordinateTransformation
    slot_usage:
      type:
        ifabsent: string(affine)
    attributes:
      affine:
        description: The flip matrix
        range: int
        array:
          exact_number_dimensions: 2
          dimensions:
            - alias: exact_card
              exact_cardinality: 2
            - alias: exact_card
              exact_cardinality: 2

  Sequence:
    description: A sequence of transformations
    is_a: CoordinateTransformation
    slot_usage:
      type:
        ifabsent: string(sequence)
    attributes:
      sequence:
        description: The sequence of transformations
        range: CoordinateTransformation
        multivalued: true

  AlignMovieFrame:
    description: A sequence of transformations to align a movie frame to a movie
    is_a: Sequence
    slot_usage:
      type:
        ifabsent: string(align_movie_frame)
    attributes:
      target:
        description: The target merged movie of the alignment
        range: string

  ImagePixelSize:
    description: A scaling transformation that defines physical pixel size
    is_a: Scale
    slot_usage:
      type:
        if_absent: string(image_pixel_size)

  ImageSuperResolutionPixelSize:
    description: A scaling transformation that defines physical pixel size
    is_a: Scale
    slot_usage:
      type:
        if_absent: string(image_super_resolution_pixel_size)

  AlignProjectionImage:
    description: A sequence of transformations to align a projection image to a tilt series
    is_a: Sequence
    slot_usage:
      type:
        ifabsent: string(align_projection_image)
    attributes:
      target:
        description: The target tilt series of the alignment
        range: string

  AlignSubtomogram:
    description: A sequence of transformations to align a subtomogram to a tomogram
    is_a: Sequence
    slot_usage:
      type:
        ifabsent: string(align_subtomogram)
    attributes:
      target:
        description: The target tomogram of the alignment
        range: string

  AlignMap:
    description: A sequence of transformations to align a map to a tomogram
    is_a: Sequence
    slot_usage:
      type:
        ifabsent: string(align_map)
    attributes:
      target:
        description: The target tomogram of the alignment
        range: string

  AlignAnnotation:
    description: A sequence of transformations to align an annotation to a tomogram or 2D image
    is_a: Sequence
    slot_usage:
      type:
        ifabsent: string(align_annotation)
    attributes:
      target:
        description: The target of the alignment; tomogram or 2D image
        range: string

enums:
  TransformationType:
    permissible_values:
      identity:
        description: The identity transformation.
      map_axis:
        description: Axis permutation transformation
      translation:
        description: A translation transformation.
      scale:
        description: A scaling transformation.
      affine:
        description: An affine transformation
      sequence:
        description: A sequence of transformations
      image_pixel_size:
        description: A scaling transformation that defines physical pixel size
      image_super_resolution_pixel_size:
        description: A scaling transformation that defines super resolution physical pixel size
      align_movie_frame:
        description: A sequence of transformations to align a movie frame to a movie
      align_projection_image:
        description: A sequence of transformations to align a projection image to a tilt series
      align_subtomogram:
        description: A sequence of transformations to align a subtomogram frame to a tomogram
      align_map:
        description: A sequence of transformations to align a map frame to a tomogram
      align_annotation:
        description: A sequence of transformations to align an annotation to a tomogram or 2D image